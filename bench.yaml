# bench.yaml
datasets:
  # on-the-fly 1-D presentation baseline
  - name: bench1d_32
      # generation parameters (interpreted by orchestrator)
    gen:
      mode: 1d          # 1d or 2d
      n: 128
      size: 32
      timesteps: 4
      density: 0.5
      seed: 123
    path: data/bench1d_32.jsonl # orchestrator will create it
    dim: 1 # for the chooser logic

  # on-the-fly 2-D presentation baseline
  - name: bench2d_32x32
    gen:
      mode: 2d
      n: 128
      height: 32
      width: 32
      timesteps: 1
      density: 0.5
      seed: 42
    path: data/bench2d_32x32.jsonl
    dim: 2

# price_per_1k_tokens is a single blended rate applied to total (prompt + completion)
# tokens. It is a 50/50 input+output approximation of OpenAI list prices; true cost
# needs an input/output split (a usage-ledger schema change, deferred).
models:
  - id: gpt-5.4-nano
    provider: openai
    max_calls_per_min: 120
    price_per_1k_tokens: 0.000725
    temperature: 0

  - id: gpt-5.4
    provider: openai
    max_calls_per_min: 60
    price_per_1k_tokens: 0.00875
    temperature: 0

  - id: gpt-5.4-mini
    provider: openai
    max_calls_per_min: 60
    price_per_1k_tokens: 0.002625
    temperature: 0

presets:
  - name: quick
    description: Baseline presentation run across both built-in datasets with the cheapest model.
    datasets:
      - bench1d_32
      - bench2d_32x32
    models:
      - gpt-5.4-nano

  - name: presentation
    description: Cross-check both benchmark datasets with the cheaper presentation-friendly models.
    datasets:
      - bench1d_32
      - bench2d_32x32
    models:
      - gpt-5.4-nano
      - gpt-5.4-mini
