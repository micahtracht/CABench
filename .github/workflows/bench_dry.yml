name: CA-Bench dry run

on:
  workflow_dispatch:    # only manual triggers

jobs:
  dry:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Orchestrator dry run
        run: |
          python -m cabench run \
            --config bench.yaml \
            --dry-run \
            --data-dir ci_artifacts/data \
            --log-dir ci_artifacts/logs \
            --results-dir ci_artifacts/results \
            --no-summary \
            --no-report

      - name: Sanity-check artefacts
        run: |
          test -f ci_artifacts/results/scores.csv
          grep -q "norm_hamming" ci_artifacts/results/scores.csv

      - name: Generate report from dry-run outputs
        run: |
          python -m cabench report \
            --scores ci_artifacts/results/scores.csv \
            --out ci_artifacts/results/report.txt

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cabench-dry-run-artifacts
          path: ci_artifacts/
