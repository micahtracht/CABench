name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check cabench tests

      - name: Format check (ruff)
        run: ruff format --check cabench tests

      - name: Type check (mypy)
        run: mypy cabench

      - name: Run test suite with coverage
        run: pytest --cov=cabench --cov-report=term-missing --cov-fail-under=75

      - name: Dry-run smoke + generate report
        run: |
          mkdir -p ci_artifacts
          python -m cabench run \
            --config bench.yaml \
            --dry-run \
            --data-dir ci_artifacts/data \
            --log-dir ci_artifacts/logs \
            --results-dir ci_artifacts/results \
            --no-summary \
            --no-report
          python -m cabench report \
            --scores ci_artifacts/results/scores.csv \
            --out ci_artifacts/results/report.txt

      - name: Upload CI report artifacts
        if: matrix.python-version == '3.14'
        uses: actions/upload-artifact@v4
        with:
          name: cabench-ci-artifacts
          path: ci_artifacts/
